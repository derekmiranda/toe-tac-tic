<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>toe-tac-tic</title>
  </head>
  <body>
    <main id="root">
      <canvas id="canvas"></canvas>
    </main>
    <!-- TODO: remove layout and let script put svgs on DOM -->
    <svg
      id="svg"
      width="128"
      height="128"
      viewBox="0 0 128 128"
      version="1.1"
      xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink"
      xml:space="preserve"
      xmlns:serif="http://www.serif.com/"
      style="
        fill-rule: evenodd;
        clip-rule: evenodd;
        stroke-linejoin: round;
        stroke-miterlimit: 2;
        display: none;
      "
    >
      <path
        id="circle"
        d="M8.104999999999997,64a55.895,55.895 0 1,0 111.79,0a55.895,55.895 0 1,0 -111.79,0"
        style="fill: none; stroke: none"
      />
    </svg>

    <svg
      id="gradient"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 128 128"
      fill="none"
    >
      <defs>
        <linearGradient
          id="grad"
          x1="0"
          y1="0"
          x2="99"
          y2="99"
          gradientUnits="userSpaceOnUse"
        >
          <stop offset="0.2" stop-color="rgb(255, 135, 9)" />
          <stop offset="0.7" stop-color="rgb(247, 189, 248)" />
        </linearGradient>
      </defs>
    </svg>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomEase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/MorphSVGPlugin.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
